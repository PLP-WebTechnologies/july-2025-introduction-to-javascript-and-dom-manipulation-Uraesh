<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript Fundamentals</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mastering JavaScript Fundamentals</h1>

  <!-- Part 1: Variables and Conditionals -->
  <section>
    <h2>Part 1: Basics</h2>
    <p id="part1-output"></p>
  </section>

  <!-- Part 2: Functions -->
  <section>
    <h2>Part 2: Functions</h2>
    <button onclick="greetUser('Daniel')">Say Hello</button>
    <p id="greet-output"></p>

    <button onclick="calculateTotal(5, 10)">Calculate Total</button>
    <p id="total-output"></p>
  </section>

  <!-- Part 3: Loops -->
  <section>
    <h2>Part 3: Loops</h2>
    <button onclick="showCountdown()">Start Countdown</button>
    <p id="countdown-output"></p>

    <button onclick="listFruits()">List Fruits</button>
    <ul id="fruit-list"></ul>
  </section>

  <!-- Part 4: DOM -->
  <section>
    <h2>Part 4: DOM</h2>
    <button id="toggle-btn">Toggle Text</button>
    <p id="toggle-text">Hello! Click the button to hide/show me.</p>

    <input type="text" id="new-item" placeholder="Add new item">
    <button onclick="addItem()">Add Item</button>
    <ul id="dynamic-list"></ul>

    <button onclick="changeColor()">Change Background Color</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
